<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cara superior -->
  <polygon points="50,10 88,30 50,50 12,30" fill="#7b3f00"/>
  <!-- Cara izquierda -->
  <polygon points="12,30 50,50 50,90 12,70" fill="#4a2000"/>
  <!-- Cara derecha -->
  <polygon points="88,30 50,50 50,90 88,70" fill="#9e5200"/>
  <!-- Líneas tableta cara superior (cuadrícula) -->
  <line x1="50" y1="15" x2="50" y2="49" stroke="#5a2e00" stroke-width="1.5" opacity="0.5"/>
  <line x1="69" y1="20" x2="31" y2="40" stroke="#5a2e00" stroke-width="1.5" opacity="0.5"/>
  <line x1="31" y1="20" x2="69" y2="40" stroke="#5a2e00" stroke-width="1.5" opacity="0.5"/>
  <!-- Brillo cara superior -->
  <polygon points="50,14 72,25 58,32 36,21" fill="#c47a3a" opacity="0.25"/>
</svg>
